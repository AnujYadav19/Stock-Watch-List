spring.application.name=stockwatchlist

# db connection
spring.datasource.url=jdbc:mysql://localhost:3306/stock_watchlist
spring.datasource.username=springstudent
spring.datasource.password=springstudent

spring.jpa.hibernate.ddl-auto=update
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# logging
logging.level.root=INFO
logging.level.com.anuj.stockwatchlist=DEBUG

# finnhub
finnhub.api.key=${FINNHUB_API_KEY}
finnhub.base.url=https://finnhub.io/api/v1
# can ignore the yellow warning

# jwt
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

